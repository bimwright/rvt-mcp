name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  plugin:
    name: plugin-${{ matrix.revit }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - revit: R22
            dir: plugin-r22
            project: src/plugin-r22/Bimwright.Plugin.R22.csproj
            tfm: net48
          - revit: R23
            dir: plugin-r23
            project: src/plugin-r23/Bimwright.Plugin.R23.csproj
            tfm: net48
          - revit: R24
            dir: plugin-r24
            project: src/plugin-r24/Bimwright.Plugin.R24.csproj
            tfm: net48
          - revit: R25
            dir: plugin-r25
            project: src/plugin-r25/Bimwright.Plugin.R25.csproj
            tfm: net8.0-windows7.0
          - revit: R26
            dir: plugin-r26
            project: src/plugin-r26/Bimwright.Plugin.R26.csproj
            tfm: net8.0-windows7.0
          - revit: R27
            dir: plugin-r27
            project: src/plugin-r27/Bimwright.Plugin.R27.csproj
            tfm: net10.0-windows7.0
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (8 + 10 preview)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        run: dotnet build ${{ matrix.project }} -c Release --no-restore

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: bimwright-plugin-${{ matrix.revit }}
          path: src/${{ matrix.dir }}/bin/Release/${{ matrix.tfm }}/
          retention-days: 14

  server:
    name: server-nuget
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/server/Bimwright.Server.csproj

      - name: Build
        run: dotnet build src/server/Bimwright.Server.csproj -c Release --no-restore

      - name: Pack .NET tool
        run: dotnet pack src/server/Bimwright.Server.csproj -c Release --no-build --output artifacts

      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: bimwright-server-nupkg
          path: artifacts/*.nupkg
          retention-days: 14

  tests:
    name: tests-xunit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore tests/Bimwright.Tests/Bimwright.Tests.csproj

      - name: Test
        run: dotnet test tests/Bimwright.Tests/Bimwright.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/Bimwright.Tests/TestResults/*.trx
          retention-days: 14
